card:
  name: Revisionist Future
  type: Spell
  cost: 🜁🜁X
  text:
    - Stack the top X cards of any player's deck.
    - Who controls the past controls the future. Who controls the present controls the past. ―Orwell
  prompt:
    - Use a 11:19 aspect ratio for the output image
    - The card should have a black border.
    - The card should fill the remainder of the space.
    - There should be a space for an image.
    - There should be a box for text.
    - The name goes in the upper left.
    - The cost goes in the lower left.  That uses the alchemical symbol for air which is a triangle with a line through it.
    - The type goes in the bottom right.
    - The background of the card should be yellow.
    - The image should be of a timeline represented by a branch with some branches growing and others broken off.
    - The entire card, the text, background and the image should look hand drawn in the style of the comic Transmetropolitan.  The image should be detailed and intricate, with lots of line work and shading.
    - The yellow border of the card should have intricate detail, designs, computer symbols, code and shading.